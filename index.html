<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wavelength Psychology | Coming Soon</title>
    <meta name="description" content="Wavelength Psychology — Dr. Zainub Mallick, PsyD. Something beautiful is coming soon.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Sora:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fffef9;
            color: #1a1d1f;
            font-family: 'Sora', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 560px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            color: #1a9fad;
            margin-bottom: 3.5rem;
        }

        .wave {
            display: block;
            margin: 0 auto 3rem;
            width: 120px;
            opacity: 0.25;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 8vw, 3.75rem);
            font-weight: 500;
            line-height: 1.15;
            color: #1a1d1f;
            margin-bottom: 1.5rem;
        }

        h1 em {
            font-style: italic;
            color: #1a9fad;
        }

        .tagline {
            font-size: 1rem;
            font-weight: 300;
            color: #6b7280;
            line-height: 1.7;
            margin-bottom: 3rem;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: #1a9fad;
            margin: 0 auto 3rem;
            opacity: 0.4;
        }

        .contact-label {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 0.75rem;
        }

        .contact-link {
            display: inline-block;
            font-size: 0.975rem;
            color: #1a9fad;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
        }

        .contact-link:hover {
            border-color: #1a9fad;
        }

        .footer {
            margin-top: 5rem;
            font-size: 0.8rem;
            color: #d1d5db;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">~ Wavelength</div>

        <svg class="wave" viewBox="0 0 120 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 12 C15 4, 30 4, 45 12 S75 20, 90 12 S105 4, 120 12"
                  stroke="#1a9fad" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </svg>

        <h1>A space to play<br>and <em>heal</em> is taking shape.</h1>

        <p class="tagline">
            Dr. Zainub Mallick, PsyD is preparing something<br>
            thoughtful. Check back soon.
        </p>

        <div class="divider"></div>

        <p class="contact-label">In the meantime</p>
        <a class="contact-link" href="mailto:zainubmallick@wavelengthpsychology.com">
            zainubmallick@wavelengthpsychology.com
        </a>
    </div>

    <p class="footer">Wavelength Psychology &nbsp;·&nbsp; Houston, TX</p>
</body>
</html>
